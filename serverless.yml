service: consulta-pe

plugins:
  - serverless-esbuild
  - serverless-offline

# El esbuild integrado de v4 no emite `emitDecoratorMetadata`, así que lo
# desactivamos y usamos el plugin serverless-esbuild con @anatine/esbuild-decorators
# para generar el metadata que NestJS necesita para inyección de dependencias.
build:
  esbuild: false

custom:
  esbuild:
    bundle: true
    minify: true
    sourcemap: true
    target: node24
    platform: node
    keepNames: true
    plugins: esbuild-plugins.js
    external:
      - '@sparticuz/chromium'    # vive en el layer
      - 'playwright-core'         # native-ish, se copia
      - '@nestjs/microservices'   # opcional NestJS, no instalado
      - '@nestjs/websockets'
      - '@fastify/static'
      - 'cache-manager'
    exclude:
      - '@sparticuz/chromium'
      - '@nestjs/microservices'
      - '@nestjs/websockets'
      - '@fastify/static'
      - 'cache-manager'
  alarmEmail: ${env:ALARM_EMAIL, 'cuevacelis@gmail.com'}
  serverless-offline:
    httpPort: 3001
    lambdaPort: 3002

package:
  individually: true

provider:
  name: aws
  profile: ${opt:aws-profile, env:AWS_PROFILE, 'default'}
  runtime: nodejs24.x
  region: us-east-1
  memorySize: 1536
  timeout: 29
  environment:
    CACHE_TABLE_NAME: ${self:service}-cache-${sls:stage}
    REFRESH_QUEUE_URL: !Ref RefreshQueue
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
          Resource: !GetAtt CacheTable.Arn
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource: !GetAtt RefreshQueue.Arn

layers:
  chromium:
    path: layer-chromium
    name: consulta-pe-chromium
    description: Chromium for Playwright on Lambda
    compatibleRuntimes:
      - nodejs24.x
    retain: false

functions:
  main:
    handler: src/main.handler
    events:
      - http:
          method: ANY
          path: /
      - http:
          method: ANY
          path: '{proxy+}'

  refreshWorker:
    handler: src/worker.handler
    timeout: 60
    layers:
      - !Ref ChromiumLambdaLayer
    environment:
      CHROMIUM_LAYER: '1'
    events:
      - sqs:
          arn: !GetAtt RefreshQueue.Arn
          batchSize: 1
          functionResponseType: ReportBatchItemFailures

resources:
  Resources:
    CacheTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-cache-${sls:stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    RefreshQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-refresh-${sls:stage}.fifo
        FifoQueue: true
        ContentBasedDeduplication: false
        # AWS recomienda VisibilityTimeout >= 6x el timeout de la Lambda consumidora.
        # Worker tiene timeout 60s -> 360s.
        VisibilityTimeout: 360
        MessageRetentionPeriod: 86400
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt RefreshDLQ.Arn
          maxReceiveCount: 3

    RefreshDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-refresh-dlq-${sls:stage}.fifo
        FifoQueue: true
        MessageRetentionPeriod: 1209600

    AlarmsTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-alarms-${sls:stage}
        DisplayName: consulta-pe alarms

    AlarmsEmailSubscription:
      Type: AWS::SNS::Subscription
      Properties:
        TopicArn: !Ref AlarmsTopic
        Protocol: email
        Endpoint: ${self:custom.alarmEmail}

    MainLambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-main-errors
        AlarmDescription: Errors in the main API Lambda
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: !Ref MainLambdaFunction
        Statistic: Sum
        Period: 60
        EvaluationPeriods: 1
        DatapointsToAlarm: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - !Ref AlarmsTopic

    WorkerLambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-refreshWorker-errors
        AlarmDescription: Errors in the SQS refresh worker Lambda
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: !Ref RefreshWorkerLambdaFunction
        Statistic: Sum
        Period: 60
        EvaluationPeriods: 1
        DatapointsToAlarm: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - !Ref AlarmsTopic

    RefreshDLQAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${sls:stage}-refresh-dlq
        AlarmDescription: Messages landed in the refresh DLQ
        Namespace: AWS/SQS
        MetricName: ApproximateNumberOfMessagesVisible
        Dimensions:
          - Name: QueueName
            Value: !GetAtt RefreshDLQ.QueueName
        Statistic: Maximum
        Period: 60
        EvaluationPeriods: 1
        DatapointsToAlarm: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - !Ref AlarmsTopic
